<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Sleep Tracker</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.container{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:350px;
  text-align:center;
}

input{
  width:80px;
  padding:10px;
  border:none;
  border-radius:8px;
  text-align:center;
}

button{
  margin-top:15px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#38bdf8;
  font-size:16px;
}

.card{
  background:#334155;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌙 Sleep Tracker</h1>

<p>Bugun nechchi soat uxlading?</p>

<input type="number" id="hours" min="0" max="24" placeholder="8">

<br>

<button onclick="saveSleep()">💾 Save</button>

<h2>📊 Statistikalar</h2>

<div class="card">
  <p>📅 Entries: <span id="entries">0</span></p>
  <p>😴 Average Sleep: <span id="average">0</span> h</p>
</div>

<div id="history"></div>

</div>

<script>
let sleeps = JSON.parse(localStorage.getItem("sleep_data")) || [];

function saveData() {
  localStorage.setItem("sleep_data", JSON.stringify(sleeps));
}

function saveSleep() {
  const hours = Number(document.getElementById("hours").value);

  if(!hours) return;

  sleeps.push({
    hours,
    date: new Date().toLocaleDateString()
  });

  saveData();

  render();

  document.getElementById("hours").value = "";
}

function render() {
  const history = document.getElementById("history");

  history.innerHTML = "";

  let total = 0;

  sleeps.forEach(item => {

    total += item.hours;

    history.innerHTML += `
      <div class="card">
        🌙 ${item.hours}h — 📅 ${item.date}
      </div>
    `;
  });

  const avg =
    sleeps.length
      ? (total / sleeps.length).toFixed(1)
      : 0;

  document.getElementById("entries").innerText =
    sleeps.length;

  document.getElementById("average").innerText =
    avg;
}

render();
</script>

</body>
</html>
